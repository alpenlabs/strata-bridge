x-base-secret-service: &base-secret-service
  image: secret-service:latest
  build:
    context: .
    dockerfile: ./docker/secret-service/Dockerfile
  environment:
    - SECRET_SERVICE_DEV=0 # use ./docker/gen_s2_tls.sh to gen tls certs
    - RUST_LOG=info

x-base-asm-runner: &base-asm-runner
  image: strata-asm-runner:latest
  build:
    context: .
    dockerfile: ./docker/asm-runner/Dockerfile
  environment:
    - RUST_LOG=info
    # asm-params.json is written by the asm-params-init service into the
    # shared /app volume below — we just read it.
    - PARAMS_FILE=/app/asm-params.json
  ports:
    - 9010:9010
  volumes:
    - ./docker/vol/asm-runner:/app
  depends_on:
    bitcoind:
      condition: service_started
    asm-params-init:
      condition: service_completed_successfully
  networks:
    - bridge

x-base-bridge-node: &base-bridge-node
  image: strata-bridge:latest
  build:
    context: .
    dockerfile: ./docker/strata-bridge/Dockerfile
  environment:
    - MODE=operator
    - RUST_LOG=info
    - LOG_FILE=0
    - LOG_LINE_NUM=0
    - RUST_BACKTRACE=full
    - FDB_CLUSTER_FILE=/var/fdb/fdb.cluster
  depends_on:
    - bitcoind
    - foundationdb
    - asm-runner

x-base-mosaic: &base-mosaic
  build:
    context: https://github.com/alpenlabs/mosaic.git#v0.3.0-rc.2
    dockerfile: docker/Dockerfile
  depends_on:
    foundationdb:
      condition: service_healthy

services:
  foundationdb:
    image: foundationdb/foundationdb:7.3.75
    environment:
      - FDB_NETWORKING_MODE=container
      - FDB_CLUSTER_FILE=/var/fdb/fdb.cluster
    volumes:
      - ./docker/vol/fdb/fdb.cluster:/var/fdb/fdb.cluster:ro
      - ./docker/vol/fdb/data:/var/fdb/data
    ports:
      # NOTE: (zk2u) Keep this port in sync with docker/vol/fdb/fdb.cluster
      - "4500:4500"
    networks:
      - bridge
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "fdbcli --no-status --exec 'status minimal' 2>/dev/null | grep -q 'The database is available' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  asm-runner:
    <<: *base-asm-runner

  # One-shot helper: grabs live L1 anchor data from bitcoind, fills in
  # asm-params-sample.json, and drops asm-params.json into the asm-runner
  # volume. asm-runner just reads the file — it doesn't do this itself.
  asm-params-init:
    image: python:3.12-slim
    restart: "no"
    depends_on:
      bitcoind:
        condition: service_healthy
    volumes:
      - ./docker/asm-runner/fill_asm_params.py:/usr/local/bin/fill_asm_params.py:ro
      - ./docker/vol/asm-runner:/app
    command:
      - python3
      - /usr/local/bin/fill_asm_params.py
      - --rpc-url=http://bitcoind:18443
      - --rpc-user=user
      - --rpc-password=password
      - --params=/app/asm-params-sample.json
      - --output=/app/asm-params.json
    networks:
      - bridge

  secret-service-1:
    <<: *base-secret-service
    ports:
      - 11000:3000
      - 19616:9616
    volumes:
      - ./docker/vol/secret-service-1:/app
    networks:
      - bridge
  bridge-1:
    <<: *base-bridge-node
    ports:
      - 15678:5678
      - 15679:5679
      - 13000:3000
      - 19615:9615
    volumes:
      - ./docker/vol/strata-bridge-1:/app
      - ./migrations:/app/migrations
      - ./docker/vol/fdb/fdb.cluster:/var/fdb/fdb.cluster:ro
    networks:
      - bridge

  secret-service-2:
    <<: *base-secret-service
    ports:
      - 21000:3000
      - 29616:9616
    volumes:
      - ./docker/vol/secret-service-2:/app
    networks:
      - bridge
  bridge-2:
    <<: *base-bridge-node
    ports:
      - 25678:5678
      - 25679:5679
      - 23000:3000
      - 29615:9615
    volumes:
      - ./docker/vol/strata-bridge-2:/app
      - ./migrations:/app/migrations
      - ./docker/vol/fdb/fdb.cluster:/var/fdb/fdb.cluster:ro
    networks:
      - bridge

  secret-service-3:
    <<: *base-secret-service
    ports:
      - 31000:3000
      - 39616:9616
    volumes:
      - ./docker/vol/secret-service-3:/app
    networks:
      - bridge
  bridge-3:
    <<: *base-bridge-node
    ports:
      - 35678:5678
      - 35679:5679
      - 33000:3000
      - 39615:9615
    volumes:
      - ./docker/vol/strata-bridge-3:/app
      - ./migrations:/app/migrations
      - ./docker/vol/fdb/fdb.cluster:/var/fdb/fdb.cluster:ro
    networks:
      - bridge

  bitcoind:
    image: bitcoin/bitcoin:30
    volumes:
      - ./docker/bitcoin/entrypoint.sh:/entrypoint.sh
    ports:
      - 18443:18443
      - 18444:18444
      - 28332:28332
      - 28333:28333
      - 28334:28334
      - 28335:28335
      - 28336:28336
    # see logs from the bridge node to populate these env vars
    #
    # Example:
    #
    # INFO operator_wallet: crates/operator-wallet/src/lib.rs:87: general wallet address: bcrt1pjrd2pungnh6ae7acw9dt92t5hj8gkn2gh8nuwu2r3kakklkswqrquyus8n
    # INFO operator_wallet: crates/operator-wallet/src/lib.rs:95: reserved wallet address: bcrt1pga206rnnd9vchqvs5s0gax4v99pdzlml470f3tfw8nfaemmmu0wsjru24g
    environment:
      - GENERAL_WALLET_1=$GENERAL_WALLET_1
      - GENERAL_WALLET_2=$GENERAL_WALLET_2
      - GENERAL_WALLET_3=$GENERAL_WALLET_3
      - AUTOMINE=5 # every 5 seconds, set to 0 to disable auto generating blocks, keep in alignment with `block_time` in sidesystem params
    # Wait until the chain reaches ASM genesis height (anchor.block.height in
    # asm-params-sample.json) so asm-params-init can actually find that block.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'test "$$(bitcoin-cli -regtest -rpcuser=user -rpcpassword=password getblockcount)" -ge 101',
        ]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 5s
    networks:
      - bridge

  mosaic-1:
    <<: *base-mosaic
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./functional-tests/artifacts/mosaic_depositidx_ckt.v5c:/etc/mosaic/circuit.v5c:ro
      - ./docker/vol/fdb/fdb.cluster:/etc/foundationdb/fdb.cluster:ro
      - ./docker/vol/mosaic-1/config.toml:/etc/mosaic/config.toml:ro
      - ./docker/vol/mosaic-1/data:/etc/mosaic/tables:rw

  mosaic-2:
    <<: *base-mosaic
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ./functional-tests/artifacts/mosaic_depositidx_ckt.v5c:/etc/mosaic/circuit.v5c:ro
      - ./docker/vol/fdb/fdb.cluster:/etc/foundationdb/fdb.cluster:ro
      - ./docker/vol/mosaic-2/config.toml:/etc/mosaic/config.toml:ro
      - ./docker/vol/mosaic-2/data:/etc/mosaic/tables:rw

  mosaic-3:
    <<: *base-mosaic
    ports:
      - "127.0.0.1:8003:8000"
    volumes:
      - ./functional-tests/artifacts/mosaic_depositidx_ckt.v5c:/etc/mosaic/circuit.v5c:ro
      - ./docker/vol/fdb/fdb.cluster:/etc/foundationdb/fdb.cluster:ro
      - ./docker/vol/mosaic-3/config.toml:/etc/mosaic/config.toml:ro
      - ./docker/vol/mosaic-3/data:/etc/mosaic/tables:rw

networks:
  bridge:
