# Trivy ignore file — HIGH/CRITICAL findings on Cargo.lock that cannot
# currently be remediated by a dependency bump. Each `statement` records the
# dependency path, why no fix is reachable, and what an upstream fix needs.
# Statements surface in `trivy ... --show-suppressed` output.
#
# Keep this in sync with .cargo/audit.toml (cargo-audit uses RUSTSEC IDs;
# Trivy uses the GHSA/CVE aliases below).
vulnerabilities:
  - id: GHSA-3v94-mw7p-v465
    statement: |
      hickory-proto 0.25.2 — NSEC3 closest-encloser proof validation enters
      an unbounded loop on cross-zone responses (RUSTSEC-2026-0118).

      Dependency path:
        hickory-proto 0.25.2
          -> hickory-resolver 0.25.2
            -> libp2p-dns 0.44.0 / libp2p-mdns 0.48.0
              -> libp2p 0.56.0 -> strata-p2p

      Why unfixable: no patched 0.25.x release exists. The fix landed only
      after the code moved to the hickory-net crate (>= 0.26.1). The latest
      published libp2p-dns 0.44.0 / libp2p-mdns 0.48.0 still pin
      hickory-proto ^0.25.2, so the 0.26 line is unreachable via semver.

      Required fix: libp2p must release a version that bumps hickory to 0.26,
      then this workspace bumps libp2p. Upstream bump in flight:
      https://github.com/libp2p/rust-libp2p/pull/6395
      https://github.com/libp2p/rust-libp2p/issues/6412

      Risk: low. hickory is reached only via libp2p peer-discovery / DNS
      paths; this codebase does not perform DNSSEC validation on untrusted
      records.

  - id: CVE-2026-32314
    statement: |
      yamux 0.12.1 — remote panic via a malformed Data frame with SYN set
      and an oversized body length (> DEFAULT_CREDIT).

      Dependency path:
        yamux 0.12.1
          -> libp2p-yamux 0.47.0 (renamed dep `yamux012`, package = "yamux",
             req "^0.12.1" — kept for the legacy WindowUpdateMode API)
            -> libp2p 0.56.0 -> strata-p2p

      Note: the same CVE also affected the yamux 0.13.x instance pulled by
      libp2p-yamux; that one has been bumped to 0.13.10 and is now fixed.
      Only the 0.12.x compat dependency remains.

      Why unfixable: the fix exists only in yamux 0.13.10; there is no
      patched 0.12.x release. libp2p-yamux 0.47.0 (latest published) still
      declares a second, renamed `yamux012` dependency on yamux ^0.12.1, so
      the 0.13 line cannot satisfy it.

      Required fix: libp2p-yamux must release a version that drops the
      yamux 0.12 compatibility shim, then this workspace bumps libp2p.

      Risk: low for this codebase, despite the CVE being a remotely
      reachable, unauthenticated panic (CVSS 8.7). libp2p-yamux 0.47.0
      dispatches between two Yamux backends: an unmodified
      `yamux::Config::default()` resolves to yamux 0.13, and the yamux 0.12
      (`Config012`) branch is selected only when the application mutates the
      muxer config via a `set_*` call. strata-p2p builds its transport with
      bare `yamux::Config::default()` (crates/p2p/src/swarm/mod.rs) and
      never configures it, so the live path is yamux 0.13 — already bumped
      to the patched 0.13.10. The vulnerable yamux 0.12 code path is linked
      but not reachable at runtime.

  - id: CVE-2026-46654
    statement: |
      p3-challenger 0.3.3-succinct — MultiField32Challenger Fiat-Shamir
      transcript malleability / challenge entropy loss (GHSA-vj64-rjf3-w3v7).

      Dependency path:
        p3-challenger 0.3.3-succinct
          -> slop-* / sp1-prover 6.2.0 -> sp1-sdk 6.2.0
            -> zkaleido-sp1-host (`sp1` feature) -> strata-bridge-proof

      Why unfixable: the fix lands only in the upstream p3-challenger
      0.4.3 / 0.5.3. The installed crate is Succinct's Plonky3 fork, whose
      latest release is 0.3.3-succinct; sp1-sdk 6.2.x pins the fork, so the
      0.4/0.5 line is unreachable via semver.

      Required fix: Succinct ships a patched fork and bumps SP1's Plonky3
      pin, then this workspace bumps sp1-sdk / sp1-verifier.

      Risk: proving-side Fiat-Shamir soundness flaw in SP1's BN254-wrapping
      challenger. The workspace delegates proving to SP1 rather than driving
      this challenger directly; it is not a remotely reachable path in the
      running bridge node.
