name: Orphan Check

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions: {}

jobs:
  orphan-check:
    name: Check comment format orphans
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Verify TODO/FIXME Jira-link format
        run: python3 scripts/orphan_check.py --format jira-link --slugs TODO FIXME

      - name: Verify NOTE/HACK/PERF assignee format
        run: python3 scripts/orphan_check.py --format assignee --slugs NOTE HACK PERF --allow-rust-docstrings NOTE
