name: guest-build

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Keep in sync with `sp1-sdk` / `sp1-verifier` versions in workspace `Cargo.toml`.
  SP1_VERSION: v6.2.0

permissions: {}

jobs:
  extract-rust-version:
    name: Extract toolchain version
    runs-on: ubuntu-latest
    outputs:
      nightly-version: ${{ steps.extract-version.outputs.nightly-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract Rust version
        id: extract-version
        uses: ./.github/actions/extract-rust-version

  sp1-guest-build:
    name: Build SP1 bridge-proof guest program with bundled stub params
    runs-on: ubuntu-latest
    needs: extract-rust-version
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        env:
          RUST_NIGHTLY: ${{ needs.extract-rust-version.outputs.nightly-version }}
        run: |
          rustup toolchain install "$RUST_NIGHTLY" --profile minimal
          rustup default "$RUST_NIGHTLY"

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          cache-on-failure: true

      - name: Install SP1 toolchain
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up --version "$SP1_VERSION"
          echo "$HOME/.sp1/bin" >> "$GITHUB_PATH"

      - name: Verify SP1 toolchain
        run: cargo prove --version

      - name: Build SP1 guest with bundled stub params
        env:
          SKIP_PARAMS: "1"
        run: cargo build --locked -p strata-bridge-sp1-guest-builder --release

  guest-build-success:
    name: Check that guest build passed
    runs-on: ubuntu-latest
    if: always()
    needs: [sp1-guest-build]
    timeout-minutes: 5
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
