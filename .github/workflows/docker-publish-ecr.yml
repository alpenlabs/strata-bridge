name: Docker Publish to ECR

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git branch, tag, or commit SHA to build. Defaults to the selected branch in the UI.
        required: false
        type: string
      components:
        description: Comma-separated components to build. Use any of base,rt,strata-bridge,strata-asm-runner,secret-service,all.
        required: false
        default: all
        type: string
      dependency_tag:
        description: Existing ECR tag for bridge-base and bridge-rt when they are not rebuilt in this run.
        required: false
        type: string

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY || '888577024788.dkr.ecr.us-east-1.amazonaws.com' }}
  ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX || 'tn1' }}
  PUBLIC_ECR_REGISTRY: public.ecr.aws
  PUBLIC_ECR_NAMESPACE: z5c7y9u9
  PUBLIC_ECR_REGION: us-east-1
  DOCKER_PLATFORM: linux/amd64

permissions:
  contents: read

concurrency:
  group: docker-publish-ecr-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Resolve Build Plan
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.plan.outputs.checkout_ref }}
      resolved_sha: ${{ steps.plan.outputs.resolved_sha }}
      image_tag: ${{ steps.plan.outputs.image_tag }}
      dependency_tag: ${{ steps.plan.outputs.dependency_tag }}
      dependency_matrix: ${{ steps.plan.outputs.dependency_matrix }}
      app_matrix: ${{ steps.plan.outputs.app_matrix }}
    steps:
      - name: Validate manual inputs
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_DEPENDENCY_TAG: ${{ inputs.dependency_tag }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_REF}" ]]; then
            if [[ "${INPUT_REF}" =~ [[:space:]] ]]; then
              echo "::error::ref must not contain whitespace"
              exit 1
            fi
            if [[ ! "${INPUT_REF}" =~ ^[A-Za-z0-9._/@:-]+$ ]]; then
              echo "::error::ref contains unsupported characters"
              exit 1
            fi
          fi

          if [[ -n "${INPUT_DEPENDENCY_TAG}" ]]; then
            if [[ "${INPUT_DEPENDENCY_TAG}" =~ [[:space:]] ]]; then
              echo "::error::dependency_tag must not contain whitespace"
              exit 1
            fi
            if [[ ! "${INPUT_DEPENDENCY_TAG}" =~ ^[A-Za-z0-9._-]{1,128}$ ]]; then
              echo "::error::dependency_tag must match [A-Za-z0-9._-]{1,128}"
              exit 1
            fi
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Resolve plan
        id: plan
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_COMPONENTS: ${{ inputs.components }}
          INPUT_DEPENDENCY_TAG: ${{ inputs.dependency_tag }}
        run: |
          set -euo pipefail

          checkout_ref="${INPUT_REF:-${GITHUB_REF}}"
          if [[ -z "${checkout_ref}" ]]; then
            checkout_ref="${GITHUB_SHA}"
          fi

          resolved_sha="$(git rev-parse HEAD)"
          image_tag="$(git rev-parse --short=8 HEAD)"

          components="${INPUT_COMPONENTS// /}"
          if [[ -z "${components}" ]]; then
            components="strata-bridge,strata-asm-runner,secret-service"
          fi

          build_base=false
          build_rt=false
          build_strata_bridge=false
          build_asm_runner=false
          build_secret_service=false

          if [[ "${components}" == "all" ]]; then
            build_base=true
            build_rt=true
            build_strata_bridge=true
            build_asm_runner=true
            build_secret_service=true
          else
            IFS=',' read -r -a requested <<< "${components}"
            for component in "${requested[@]}"; do
              case "${component}" in
                base) build_base=true ;;
                rt) build_rt=true ;;
                strata-bridge) build_strata_bridge=true ;;
                strata-asm-runner) build_asm_runner=true ;;
                secret-service) build_secret_service=true ;;
                "") ;;
                *)
                  echo "::error::Unsupported component: ${component}"
                  exit 1
                  ;;
              esac
            done
          fi

          # If any app image is requested alongside only one dependency image, force both base and rt to be built together.
          if [[ ("${build_strata_bridge}" == "true" || "${build_asm_runner}" == "true" || "${build_secret_service}" == "true") && ("${build_base}" == "true" || "${build_rt}" == "true") ]]; then
            build_base=true
            build_rt=true
          fi

          dependency_tag="${INPUT_DEPENDENCY_TAG:-}"
          if [[ "${build_base}" == "true" || "${build_rt}" == "true" ]]; then
            dependency_tag="${image_tag}"
          elif [[ "${build_strata_bridge}" == "true" || "${build_asm_runner}" == "true" || "${build_secret_service}" == "true" ]]; then
            if [[ -z "${dependency_tag}" ]]; then
              echo "::error::dependency_tag is required when building final images without rebuilding base and rt"
              exit 1
            fi
          fi

          export BUILD_BASE="${build_base}"
          export BUILD_RT="${build_rt}"
          export BUILD_STRATA_BRIDGE="${build_strata_bridge}"
          export BUILD_ASM_RUNNER="${build_asm_runner}"
          export BUILD_SECRET_SERVICE="${build_secret_service}"

          dependency_matrix="$(python3 - <<'PY'
          import json, os
          items = []
          if os.environ["BUILD_BASE"] == "true":
              items.append({
                  "component": "base",
                  "display_name": "bridge-base",
                  "repository": "bridge-base",
                  "dockerfile": "docker/base.Dockerfile",
                  "cache_scope": "bridge-base-linux-amd64",
                  "trivy_scanners": "vuln",
                  "trivy_timeout": "15m",
              })
          if os.environ["BUILD_RT"] == "true":
              items.append({
                  "component": "rt",
                  "display_name": "bridge-rt",
                  "repository": "bridge-rt",
                  "dockerfile": "docker/rt.Dockerfile",
                  "cache_scope": "bridge-rt-linux-amd64",
                  "trivy_scanners": "vuln",
                  "trivy_timeout": "15m",
              })
          print(json.dumps(items))
          PY
          )"

          app_matrix="$(python3 - <<'PY'
          import json, os
          items = []
          if os.environ["BUILD_STRATA_BRIDGE"] == "true":
              items.append({
                  "component": "strata-bridge",
                  "display_name": "strata-bridge",
                  "repository": "strata-bridge",
                  "public_repository": "strata-bridge",
                  "dockerfile": "docker/strata-bridge/Dockerfile",
                  "local_tag": "strata-bridge:latest",
                  "trivy_scanners": "vuln,secret,misconfig",
                  "trivy_timeout": "15m",
              })
          if os.environ["BUILD_ASM_RUNNER"] == "true":
              items.append({
                  "component": "strata-asm-runner",
                  "display_name": "strata-asm-runner",
                  "repository": "strata-asm-runner",
                  "public_repository": "strata-asm-runner",
                  "dockerfile": "docker/asm-runner/Dockerfile",
                  "local_tag": "strata-asm-runner:latest",
                  "trivy_scanners": "vuln,secret,misconfig",
                  "trivy_timeout": "15m",
              })
          if os.environ["BUILD_SECRET_SERVICE"] == "true":
              items.append({
                  "component": "secret-service",
                  "display_name": "secret-service",
                  "repository": "secret-service",
                  "public_repository": "secret-service",
                  "dockerfile": "docker/secret-service/Dockerfile",
                  "local_tag": "secret-service:latest",
                  "trivy_scanners": "vuln,secret,misconfig",
                  "trivy_timeout": "15m",
              })
          print(json.dumps(items))
          PY
          )"

          {
            echo "checkout_ref=${checkout_ref}"
            echo "resolved_sha=${resolved_sha}"
            echo "image_tag=${image_tag}"
            echo "dependency_tag=${dependency_tag}"
            echo "dependency_matrix=${dependency_matrix}"
            echo "app_matrix=${app_matrix}"
          } >> "${GITHUB_OUTPUT}"

      - name: Initialize publish summary
        env:
          WORKFLOW_REF: ${{ github.ref }}
          CHECKOUT_REF: ${{ steps.plan.outputs.checkout_ref }}
          RESOLVED_SHA: ${{ steps.plan.outputs.resolved_sha }}
          IMAGE_TAG: ${{ steps.plan.outputs.image_tag }}
          DEPENDENCY_TAG: ${{ steps.plan.outputs.dependency_tag }}
        run: |
          {
            echo "## Docker Publish to ECR"
            echo
            echo "- Workflow ref: \`${WORKFLOW_REF}\`"
            echo "- Checkout ref: \`${CHECKOUT_REF}\`"
            echo "- Resolved commit: \`${RESOLVED_SHA}\`"
            echo "- Image tag: \`${IMAGE_TAG}\`"
            echo "- Dependency tag: \`${DEPENDENCY_TAG}\`"
            echo "- Scan mode: advisory"
            echo
            echo "### Selected Images"
          } >> "${GITHUB_STEP_SUMMARY}"

  build_dependencies:
    name: "Build Dependency Image: ${{ matrix.display_name }}"
    needs: plan
    if: needs.plan.outputs.dependency_matrix != '[]'
    runs-on: ubuntu-latest
    environment: AWS
    permissions:
      contents: read
      id-token: write
      security-events: write
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.dependency_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.plan.outputs.checkout_ref }}

      - name: Cleanup space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Validate AWS publish configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
        run: |
          if [[ -z "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "::error::Repository variable AWS_ROLE_TO_ASSUME is required for ECR publishing"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push ${{ matrix.display_name }}
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
        run: |
          image_ref="${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/${{ matrix.repository }}:${IMAGE_TAG}"
          # Dependency images use buildx so GHA layer cache can reuse the expensive Rust build across runs.
          docker buildx build \
            --platform "${DOCKER_PLATFORM}" \
            --file "${{ matrix.dockerfile }}" \
            --cache-from "type=gha,scope=${{ matrix.cache_scope }}" \
            --cache-to "type=gha,scope=${{ matrix.cache_scope }},mode=max" \
            --tag "${image_ref}" \
            --pull \
            --push \
            .

      - name: Scan ${{ matrix.display_name }} with Trivy
        id: trivy
        uses: ./.github/actions/trivy-scan # zizmor: ignore[unpinned-uses]
        with:
          image_ref: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/${{ matrix.repository }}:${{ needs.plan.outputs.image_tag }}
          display_name: ${{ matrix.display_name }}
          component: ${{ matrix.component }}
          repository: ${{ matrix.repository }}
          image_tag: ${{ needs.plan.outputs.image_tag }}
          ecr_registry: ${{ env.ECR_REGISTRY }}
          ecr_repository_prefix: ${{ env.ECR_REPOSITORY_PREFIX }}
          trivy_scanners: ${{ matrix.trivy_scanners }}
          trivy_timeout: ${{ matrix.trivy_timeout }}
          sarif_category: bridge-ecr-${{ matrix.component }}
          artifact_name: trivy-${{ matrix.component }}-${{ needs.plan.outputs.image_tag }}

      - name: Append publish summary
        if: always()
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
          TRIVY_STATUS: ${{ steps.trivy.outputs.status }}
        run: |
          image_ref="${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/${{ matrix.repository }}:${IMAGE_TAG}"
          {
            echo "- \`${image_ref}\`"
            echo "  scan: advisory status \`${TRIVY_STATUS:-unknown}\`"
            echo "  artifact: \`trivy-${{ matrix.component }}-${IMAGE_TAG}\`"
            echo
            cat "trivy-results/${{ matrix.component }}.md"
          } >> "${GITHUB_STEP_SUMMARY}"

  build_app_images:
    name: "Build Bridge Image: ${{ matrix.display_name }}"
    needs:
      - plan
      - build_dependencies
    if: |
      always() &&
      needs.plan.outputs.app_matrix != '[]' &&
      (needs.build_dependencies.result == 'success' || needs.build_dependencies.result == 'skipped')
    runs-on: ubuntu-latest
    environment: AWS
    permissions:
      contents: read
      id-token: write
      security-events: write
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.app_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.plan.outputs.checkout_ref }}

      - name: Cleanup space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Validate AWS publish configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          PUBLIC_AWS_ROLE_TO_ASSUME: ${{ vars.PUBLIC_AWS_ROLE_TO_ASSUME }}
        run: |
          if [[ -z "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "::error::Repository variable AWS_ROLE_TO_ASSUME is required for ECR publishing"
            exit 1
          fi
          if [[ -z "${PUBLIC_AWS_ROLE_TO_ASSUME}" ]]; then
            echo "::error::Repository variable PUBLIC_AWS_ROLE_TO_ASSUME is required for public ECR publishing"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Pull dependency images
        env:
          DEPENDENCY_TAG: ${{ needs.plan.outputs.dependency_tag }}
        run: |
          docker pull "${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/bridge-base:${DEPENDENCY_TAG}"
          docker pull "${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/bridge-rt:${DEPENDENCY_TAG}"
          docker tag "${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/bridge-base:${DEPENDENCY_TAG}" bridge-base:latest
          docker tag "${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/bridge-rt:${DEPENDENCY_TAG}" bridge-rt:latest

      - name: Build ${{ matrix.display_name }}
        run: |
          # App images use plain docker build because they depend on locally tagged bridge-base/bridge-rt images,
          # which the buildx container driver cannot reference by tag from the host Docker daemon.
          DOCKER_BUILDKIT=1 docker build \
            --platform "${DOCKER_PLATFORM}" \
            --file "${{ matrix.dockerfile }}" \
            --tag "${{ matrix.local_tag }}" \
            .

      - name: Scan ${{ matrix.display_name }} with Trivy
        id: trivy
        uses: ./.github/actions/trivy-scan # zizmor: ignore[unpinned-uses]
        with:
          image_ref: ${{ matrix.local_tag }}
          display_name: ${{ matrix.display_name }}
          component: ${{ matrix.component }}
          repository: ${{ matrix.repository }}
          image_tag: ${{ needs.plan.outputs.image_tag }}
          ecr_registry: ${{ env.ECR_REGISTRY }}
          ecr_repository_prefix: ${{ env.ECR_REPOSITORY_PREFIX }}
          trivy_scanners: ${{ matrix.trivy_scanners }}
          trivy_timeout: ${{ matrix.trivy_timeout }}
          sarif_category: bridge-ecr-${{ matrix.component }}
          artifact_name: trivy-${{ matrix.component }}-${{ needs.plan.outputs.image_tag }}

      - name: Tag and push ${{ matrix.display_name }}
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
        run: |
          image_ref="${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/${{ matrix.repository }}:${IMAGE_TAG}"
          docker tag "${{ matrix.local_tag }}" "${image_ref}"
          docker push "${image_ref}"

      - name: Configure public ECR credentials
        env:
          PUBLIC_AWS_ROLE_TO_ASSUME: ${{ vars.PUBLIC_AWS_ROLE_TO_ASSUME }}
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ env.PUBLIC_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.PUBLIC_ECR_REGION }}

      - name: Login to public ECR
        run: |
          aws ecr-public get-login-password --region "${PUBLIC_ECR_REGION}" \
            | docker login --username AWS --password-stdin "${PUBLIC_ECR_REGISTRY}"

      - name: Tag and push public ${{ matrix.display_name }}
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
        run: |
          public_image_ref="${PUBLIC_ECR_REGISTRY}/${PUBLIC_ECR_NAMESPACE}/${{ matrix.public_repository }}:${IMAGE_TAG}"
          docker tag "${{ matrix.local_tag }}" "${public_image_ref}"
          docker push "${public_image_ref}"

      - name: Append publish summary
        if: always()
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
          TRIVY_STATUS: ${{ steps.trivy.outputs.status }}
        run: |
          image_ref="${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/${{ matrix.repository }}:${IMAGE_TAG}"
          public_image_ref="${PUBLIC_ECR_REGISTRY}/${PUBLIC_ECR_NAMESPACE}/${{ matrix.public_repository }}:${IMAGE_TAG}"
          {
            echo "- \`${image_ref}\`"
            echo "  public: \`${public_image_ref}\`"
            echo "  scan: advisory status \`${TRIVY_STATUS:-unknown}\`"
            echo "  artifact: \`trivy-${{ matrix.component }}-${IMAGE_TAG}\`"
            echo
            cat "trivy-results/${{ matrix.component }}.md"
          } >> "${GITHUB_STEP_SUMMARY}"

  publish_report:
    name: Publish Scan Summary
    needs:
      - plan
      - build_dependencies
      - build_app_images
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Download Trivy artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v5.0.0
        with:
          path: trivy-artifacts
          pattern: trivy-*-${{ needs.plan.outputs.image_tag }}
          merge-multiple: false

      - name: Render aggregated Trivy summary
        env:
          SUMMARY_PATH: ${{ github.step_summary }}
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from collections import Counter
          from pathlib import Path

          severity_order = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "UNKNOWN"]
          root = Path("trivy-artifacts")
          rows = []

          for artifact_dir in sorted([p for p in root.iterdir() if p.is_dir()] if root.exists() else []):
              json_files = list(artifact_dir.glob("*.json"))
              component = artifact_dir.name
              if component.startswith("trivy-") and component.endswith(f"-{os.environ['IMAGE_TAG']}"):
                  component = component[len("trivy-") : -(len(os.environ["IMAGE_TAG"]) + 1)]

              counts = Counter()
              if json_files:
                  data = json.loads(json_files[0].read_text())
                  for target in data.get("Results", []):
                      for vuln in target.get("Vulnerabilities", []) or []:
                          counts[vuln.get("Severity", "UNKNOWN")] += 1
                      for misconfig in target.get("Misconfigurations", []) or []:
                          counts[misconfig.get("Severity", "UNKNOWN")] += 1
                      for secret in target.get("Secrets", []) or []:
                          counts[secret.get("Severity", "UNKNOWN")] += 1
                  status = "report available"
              else:
                  status = "no json report"

              rows.append({
                  "component": component,
                  "status": status,
                  "counts": counts,
              })

          lines = []
          lines.append("## Trivy Rollup")
          lines.append("")
          if not rows:
              lines.append("No Trivy artifacts were downloaded for this run.")
              lines.append("")
          else:
              lines.append("| Image | Status | Critical | High | Medium | Low | Unknown |")
              lines.append("| --- | --- | --- | --- | --- | --- | --- |")
              for row in rows:
                  lines.append(
                      "| {component} | {status} | {critical} | {high} | {medium} | {low} | {unknown} |".format(
                          component=row["component"],
                          status=row["status"],
                          critical=row["counts"].get("CRITICAL", 0),
                          high=row["counts"].get("HIGH", 0),
                          medium=row["counts"].get("MEDIUM", 0),
                          low=row["counts"].get("LOW", 0),
                          unknown=row["counts"].get("UNKNOWN", 0),
                      )
                  )
              lines.append("")
              lines.append("Artifacts contain the raw `.json`, `.sarif`, and per-image Markdown summaries.")
              lines.append("")

          markdown = "\n".join(lines) + "\n"
          Path("trivy-rollup.md").write_text(markdown, encoding="utf-8")
          with open(os.environ["SUMMARY_PATH"], "a", encoding="utf-8") as summary:
              summary.write(markdown)
          PY
          echo "::group::Aggregated Trivy rollup"
          cat trivy-rollup.md
          echo "::endgroup::"

      - name: Upload aggregated Trivy rollup artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: trivy-rollup-${{ needs.plan.outputs.image_tag }}
          if-no-files-found: error
          path: trivy-rollup.md
