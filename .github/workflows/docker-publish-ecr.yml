name: Docker Publish to ECR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git branch, tag, or commit SHA to build. Defaults to the selected branch in the UI.
        required: false
        type: string
      components:
        description: Comma-separated components to build. Use any of base,rt,strata-bridge,strata-asm-runner,secret-service,all.
        required: false
        default: all
        type: string
      dependency_tag:
        description: Existing ECR tag for bridge-base and bridge-rt when they are not rebuilt in this run.
        required: false
        type: string

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY || '888577024788.dkr.ecr.us-east-1.amazonaws.com' }}
  ECR_REPOSITORY_PREFIX: ${{ vars.ECR_REPOSITORY_PREFIX || 'tn1' }}
  PUBLIC_ECR_REGISTRY: public.ecr.aws
  PUBLIC_ECR_NAMESPACE: z5c7y9u9
  PUBLIC_ECR_REGION: us-east-1
  DOCKER_PLATFORM: linux/amd64

permissions:
  contents: read

concurrency:
  group: docker-publish-ecr-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Resolve Build Plan
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.plan.outputs.checkout_ref }}
      resolved_sha: ${{ steps.plan.outputs.resolved_sha }}
      image_tag: ${{ steps.plan.outputs.image_tag }}
      dependency_tag: ${{ steps.plan.outputs.dependency_tag }}
      dependency_matrix: ${{ steps.plan.outputs.dependency_matrix }}
      app_matrix: ${{ steps.plan.outputs.app_matrix }}
    steps:
      - name: Validate manual inputs
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_DEPENDENCY_TAG: ${{ inputs.dependency_tag }}
        run: |
          set -euo pipefail

          if [[ -n "${INPUT_REF}" ]]; then
            if [[ "${INPUT_REF}" =~ [[:space:]] ]]; then
              echo "::error::ref must not contain whitespace"
              exit 1
            fi
            if [[ ! "${INPUT_REF}" =~ ^[A-Za-z0-9._/@:-]+$ ]]; then
              echo "::error::ref contains unsupported characters"
              exit 1
            fi
          fi

          if [[ -n "${INPUT_DEPENDENCY_TAG}" ]]; then
            if [[ "${INPUT_DEPENDENCY_TAG}" =~ [[:space:]] ]]; then
              echo "::error::dependency_tag must not contain whitespace"
              exit 1
            fi
            if [[ ! "${INPUT_DEPENDENCY_TAG}" =~ ^[A-Za-z0-9._-]{1,128}$ ]]; then
              echo "::error::dependency_tag must match [A-Za-z0-9._-]{1,128}"
              exit 1
            fi
          fi

      # Workflow scripts (resolve_build_plan.sh, build_matrix.py) always come from main
      # so only reviewed, merged code runs on the runner — an untrusted inputs.ref cannot
      # inject code into the plan step.
      - name: Checkout workflow scripts from main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: main

      # The requested build ref is checked out into plan-src/ solely to resolve its SHA.
      # No code from it is executed by the runner directly.
      - name: Checkout build ref into plan-src/
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          path: plan-src

      - name: Resolve plan
        id: plan
        env:
          INPUT_REF: ${{ inputs.ref }}
          INPUT_COMPONENTS: ${{ inputs.components }}
          INPUT_DEPENDENCY_TAG: ${{ inputs.dependency_tag }}
        # Full logic in .github/scripts/resolve_build_plan.sh + .github/scripts/build_matrix.py
        run: bash .github/scripts/resolve_build_plan.sh

  build_dependencies:
    name: "Build Dependency Image: ${{ matrix.display_name }}"
    needs: plan
    if: needs.plan.outputs.dependency_matrix != '[]'
    runs-on: ubuntu-latest
    environment: AWS
    permissions:
      contents: read
      id-token: write
      security-events: write
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.dependency_matrix) }}
    steps:
      # Workflow scripts (.trivyignore.yaml, trivy-scan action, render scripts) always come from
      # main so only reviewed, merged code can affect the gate — an untrusted resolved_sha
      # cannot manipulate CVE suppressions or bypass the scan action.
      - name: Checkout workflow scripts from main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: main

      # The build ref is checked out into build-src/ and used only as Docker build context —
      # no code from it is executed by the runner directly.
      - name: Checkout build ref into build-src/
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.plan.outputs.resolved_sha }}
          path: build-src

      - name: Cleanup space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Validate AWS publish configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
        run: |
          if [[ -z "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "::error::Repository variable AWS_ROLE_TO_ASSUME is required for ECR publishing"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Build to local Docker daemon so Trivy can scan before any push.
      - name: Build ${{ matrix.display_name }}
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
        run: |
          set -euo pipefail
          local_tag="${{ matrix.component }}:local"
          image_ref="${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/${{ matrix.repository }}:${IMAGE_TAG}"
          echo "LOCAL_TAG=${local_tag}" >> "${GITHUB_ENV}"
          echo "IMAGE_REF=${image_ref}" >> "${GITHUB_ENV}"
          # Dependency images use buildx so GHA layer cache can reuse the expensive Rust build across runs.
          docker buildx build \
            --platform "${DOCKER_PLATFORM}" \
            --file "build-src/${{ matrix.dockerfile }}" \
            --cache-from "type=gha,scope=${{ matrix.cache_scope }}" \
            --cache-to "type=gha,scope=${{ matrix.cache_scope }},mode=max" \
            --tag "${local_tag}" \
            --pull \
            --load \
            build-src

      # Hard gate — no image is pushed if CRITICAL or HIGH unfixed vulnerabilities are found.
      # .trivyignore.yaml comes from the root (main) checkout — untrusted build refs cannot suppress CVEs.
      - name: Scan ${{ matrix.display_name }} with Trivy
        id: trivy
        uses: ./.github/actions/trivy-scan # zizmor: ignore[unpinned-uses]
        with:
          image_ref: ${{ env.LOCAL_TAG }}
          display_name: ${{ matrix.display_name }}
          component: ${{ matrix.component }}
          repository: ${{ matrix.repository }}
          image_tag: ${{ needs.plan.outputs.image_tag }}
          ecr_registry: ${{ env.ECR_REGISTRY }}
          ecr_repository_prefix: ${{ env.ECR_REPOSITORY_PREFIX }}
          trivy_scanners: ${{ matrix.trivy_scanners }}
          trivy_timeout: ${{ matrix.trivy_timeout }}
          sarif_category: bridge-ecr-${{ matrix.component }}
          artifact_name: trivy-${{ matrix.component }}-${{ needs.plan.outputs.image_tag }}
          trivyignores: .trivyignore.yaml
          skip_dirs: /root/.cargo,/root/.rustup

      # Push only reaches this step if the hard gate scan above passed.
      - name: Push ${{ matrix.display_name }} to ECR
        run: |
          set -euo pipefail
          docker tag "${LOCAL_TAG}" "${IMAGE_REF}"
          docker push "${IMAGE_REF}"

      - name: Append publish summary
        if: always()
        env:
          COMPONENT: ${{ matrix.component }}
          DISPLAY_NAME: ${{ matrix.display_name }}
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
          TRIVY_STATUS: ${{ steps.trivy.outputs.status }}
        run: |
          {
            echo "- \`${IMAGE_REF}\`"
            echo "  scan: \`${TRIVY_STATUS:-unknown}\`"
            echo "  artifact: \`trivy-${COMPONENT}-${IMAGE_TAG}\`"
            echo
            if [[ -f "trivy-results/${COMPONENT}.md" ]]; then
              cat "trivy-results/${COMPONENT}.md"
            else
              echo "Trivy summary unavailable for \`${DISPLAY_NAME}\`."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  build_app_images:
    name: "Build Bridge Image: ${{ matrix.display_name }}"
    needs:
      - plan
      - build_dependencies
    # always() is required so this job evaluates even when build_dependencies is skipped
    # (i.e. only app images were requested). Without it GitHub would cancel app builds
    # whenever the dependency job is skipped rather than treating skipped as a pass.
    if: |
      always() &&
      needs.plan.outputs.app_matrix != '[]' &&
      (needs.build_dependencies.result == 'success' || needs.build_dependencies.result == 'skipped')
    runs-on: ubuntu-latest
    environment: AWS
    permissions:
      contents: read
      id-token: write
      security-events: write
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.app_matrix) }}
    steps:
      # Workflow scripts (.trivyignore.yaml, trivy-scan action, render scripts) always come from
      # main so only reviewed, merged code can affect the gate — an untrusted resolved_sha
      # cannot manipulate CVE suppressions or bypass the scan action.
      - name: Checkout workflow scripts from main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: main

      # The build ref is checked out into build-src/ and used only as Docker build context —
      # no code from it is executed by the runner directly.
      - name: Checkout build ref into build-src/
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.plan.outputs.resolved_sha }}
          path: build-src

      - name: Cleanup space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Validate AWS publish configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
          PUBLIC_AWS_ROLE_TO_ASSUME: ${{ vars.PUBLIC_AWS_ROLE_TO_ASSUME }}
        run: |
          if [[ -z "${AWS_ROLE_TO_ASSUME}" ]]; then
            echo "::error::Repository variable AWS_ROLE_TO_ASSUME is required for ECR publishing"
            exit 1
          fi
          if [[ -z "${PUBLIC_AWS_ROLE_TO_ASSUME}" ]]; then
            echo "::error::Repository variable PUBLIC_AWS_ROLE_TO_ASSUME is required for public ECR publishing"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Pull dependency images
        env:
          DEPENDENCY_TAG: ${{ needs.plan.outputs.dependency_tag }}
        run: |
          # build_dependencies runs on a different runner, so app builds pull the published
          # bridge-base/bridge-rt images back from ECR and retag them into this runner's daemon.
          docker pull "${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/bridge-base:${DEPENDENCY_TAG}"
          docker pull "${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/bridge-rt:${DEPENDENCY_TAG}"
          docker tag "${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/bridge-base:${DEPENDENCY_TAG}" bridge-base:latest
          docker tag "${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/bridge-rt:${DEPENDENCY_TAG}" bridge-rt:latest

      - name: Build ${{ matrix.display_name }}
        run: |
          # App images use plain docker build because they consume the dependency images after
          # they have been pulled into this runner's local daemon; the buildx container driver
          # cannot reference those host-daemon tags directly.
          DOCKER_BUILDKIT=1 docker build \
            --platform "${DOCKER_PLATFORM}" \
            --file "build-src/${{ matrix.dockerfile }}" \
            --tag "${{ matrix.local_tag }}" \
            build-src

      # Hard gate — no image is pushed if CRITICAL or HIGH unfixed vulnerabilities are found.
      # .trivyignore.yaml comes from the root (main) checkout — untrusted build refs cannot suppress CVEs.
      - name: Scan ${{ matrix.display_name }} with Trivy
        id: trivy
        uses: ./.github/actions/trivy-scan # zizmor: ignore[unpinned-uses]
        with:
          image_ref: ${{ matrix.local_tag }}
          display_name: ${{ matrix.display_name }}
          component: ${{ matrix.component }}
          repository: ${{ matrix.repository }}
          image_tag: ${{ needs.plan.outputs.image_tag }}
          ecr_registry: ${{ env.ECR_REGISTRY }}
          ecr_repository_prefix: ${{ env.ECR_REPOSITORY_PREFIX }}
          trivy_scanners: ${{ matrix.trivy_scanners }}
          trivy_timeout: ${{ matrix.trivy_timeout }}
          sarif_category: bridge-ecr-${{ matrix.component }}
          artifact_name: trivy-${{ matrix.component }}-${{ needs.plan.outputs.image_tag }}
          trivyignores: .trivyignore.yaml

      # Push only reaches this step if the hard gate scan above passed.
      - name: Tag and push ${{ matrix.display_name }}
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
        run: |
          image_ref="${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/${{ matrix.repository }}:${IMAGE_TAG}"
          docker tag "${{ matrix.local_tag }}" "${image_ref}"
          docker push "${image_ref}"

      - name: Configure public ECR credentials
        env:
          PUBLIC_AWS_ROLE_TO_ASSUME: ${{ vars.PUBLIC_AWS_ROLE_TO_ASSUME }}
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ env.PUBLIC_AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.PUBLIC_ECR_REGION }}

      - name: Login to public ECR
        run: |
          aws ecr-public get-login-password --region "${PUBLIC_ECR_REGION}" \
            | docker login --username AWS --password-stdin "${PUBLIC_ECR_REGISTRY}"

      - name: Tag and push public ${{ matrix.display_name }}
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
        run: |
          public_image_ref="${PUBLIC_ECR_REGISTRY}/${PUBLIC_ECR_NAMESPACE}/${{ matrix.public_repository }}:${IMAGE_TAG}"
          docker tag "${{ matrix.local_tag }}" "${public_image_ref}"
          docker push "${public_image_ref}"

      - name: Append publish summary
        if: always()
        env:
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
          TRIVY_STATUS: ${{ steps.trivy.outputs.status }}
        run: |
          image_ref="${ECR_REGISTRY}/${ECR_REPOSITORY_PREFIX}/${{ matrix.repository }}:${IMAGE_TAG}"
          public_image_ref="${PUBLIC_ECR_REGISTRY}/${PUBLIC_ECR_NAMESPACE}/${{ matrix.public_repository }}:${IMAGE_TAG}"
          {
            echo "- \`${image_ref}\`"
            echo "  public: \`${public_image_ref}\`"
            echo "  scan: \`${TRIVY_STATUS:-unknown}\`"
            echo "  artifact: \`trivy-${{ matrix.component }}-${IMAGE_TAG}\`"
            echo
            if [[ -f "trivy-results/${{ matrix.component }}.md" ]]; then
              cat "trivy-results/${{ matrix.component }}.md"
            else
              echo "Trivy summary unavailable for \`${{ matrix.display_name }}\`."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  publish_report:
    name: Publish Scan Summary
    needs:
      - plan
      - build_dependencies
      - build_app_images
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Render scripts always come from main — the resolved_sha is user-supplied and must
      # not execute on the runner. Artifacts are downloaded separately and contain no code.
      - name: Checkout workflow scripts from main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: main

      - name: Download Trivy artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: trivy-artifacts
          pattern: trivy-*-${{ needs.plan.outputs.image_tag }}
          merge-multiple: false

      - name: Render aggregated Trivy summary
        env:
          WORKFLOW_REF: ${{ github.ref }}
          CHECKOUT_REF: ${{ needs.plan.outputs.checkout_ref }}
          RESOLVED_SHA: ${{ needs.plan.outputs.resolved_sha }}
          IMAGE_TAG: ${{ needs.plan.outputs.image_tag }}
          DEPENDENCY_TAG: ${{ needs.plan.outputs.dependency_tag }}
          DEPENDENCY_MATRIX: ${{ needs.plan.outputs.dependency_matrix }}
          APP_MATRIX: ${{ needs.plan.outputs.app_matrix }}
        # Full logic in .github/scripts/render_trivy_rollup.py
        run: |
          python3 .github/scripts/render_publish_overview.py
          python3 .github/scripts/render_trivy_rollup.py
          echo "::group::Aggregated Trivy rollup"
          cat trivy-rollup.md
          echo "::endgroup::"

      - name: Upload aggregated Trivy rollup artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-rollup-${{ needs.plan.outputs.image_tag }}
          if-no-files-found: error
          path: trivy-rollup.md
