name: Security

on:
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run security audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  trivy-cargo:
    name: Trivy Cargo.lock scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: v0.69.3
          cache: true

      # Guard for refs that predate .trivyignore.yaml (e.g. before STR-2637 merges).
      - name: Ensure .trivyignore.yaml exists
        run: |
          if [[ ! -f .trivyignore.yaml ]]; then
            touch .trivyignore.yaml
          fi

      # Hard gate — fails the check if unfixed CRITICAL or HIGH CVEs are found in any
      # Cargo.lock in the repo. Complements cargo audit (RustSec DB) with CVE/GHSA coverage.
      # Add justified exceptions to .trivyignore via PR.
      - name: Scan Cargo.lock with Trivy (hard gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: "true"
          exit-code: "1"
          format: table
          trivyignores: .trivyignore.yaml
          skip-dirs: functional-tests
          hide-progress: "true"
          skip-setup-trivy: "true"

      # Advisory SARIF — runs even if the hard gate failed so findings are always visible
      # in the Security tab for triage.
      - name: Scan Cargo.lock with Trivy (SARIF — Security tab)
        id: trivy_sarif_cargo
        if: always()
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: "true"
          exit-code: "0"
          format: sarif
          output: trivy-cargo.sarif
          trivyignores: .trivyignore.yaml
          skip-dirs: functional-tests
          hide-progress: "true"
          skip-setup-trivy: "true"

      - name: Upload SARIF to GitHub Security tab
        if: steps.trivy_sarif_cargo.outcome == 'success'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v3
        with:
          sarif_file: trivy-cargo.sarif
          category: cargo-fs
