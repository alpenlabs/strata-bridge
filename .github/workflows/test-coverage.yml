# Runs unit tests, functional tests and publishes coverage.

name: Tests with coverage

on:
  workflow_dispatch:
    inputs:
      RUST_LOG:
        description: "Log level"
        required: false
        default: "info"
        type: string
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-test-coverage
  cancel-in-progress: true

permissions: {}

jobs:
  unit-tests:
    uses: ./.github/workflows/unit.yml

  functional-tests:
    uses: ./.github/workflows/functional.yml

  publish-coverage:
    name: Check that unit tests pass
    runs-on: ubuntu-latest
    if: always()
    needs: [functional-tests, unit-tests]
    timeout-minutes: 10
    steps:
      # NOTE: (MdTeach) codecov action needs source files in the same path as in the lcov.info
      # ensure the source location is same in unit test, functional test and this job
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Download functional test coverage (all groups)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: functional-lcov-*
          merge-multiple: true

      - name: Download unit test coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unit-lcov

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Merge test coverage
        run: |
          shopt -s nullglob
          functional_tracefiles=()
          for f in lcov.functional.*.info; do
            functional_tracefiles+=(--add-tracefile "./$f")
          done
          if [ ${#functional_tracefiles[@]} -eq 0 ]; then
            echo "ERROR: no functional lcov files found to merge" >&2
            exit 1
          fi
          lcov --add-tracefile ./lcov.unit.info \
            "${functional_tracefiles[@]}" \
            --output-file ./lcov.info

      - name: Publish Test Coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          files: lcov.info
