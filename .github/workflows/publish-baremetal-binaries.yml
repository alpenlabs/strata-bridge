name: Publish Bare-Metal Binaries (S3)

# Builds the strata-bridge bare-metal operator binaries — bridge-client
# (strata-bridge, built --features sp1), secret-service, and dev-cli — from a
# chosen ref and publishes them, with SHA-256 checksums, to the central
# shared-services artifact bucket so external bare-metal operators can DOWNLOAD
# prebuilt binaries instead of building from source (~40-60 min/build). STR-3985.
#
# The bridge client is built WITH --features sp1 to match the deployed image
# (build_matrix.py) — testnet uses Sp1Groth16 predicates, and without the feature
# the sp1 proof backend is compiled out so an SP1 operator config can't start.
# secret-service and dev-cli are plain (no proofs). SP1 guest ELFs are published
# separately, so the build sets SP1_SKIP_PROGRAM_BUILD=true and needs no succinct
# toolchain for the binary.
#
# SECURITY MODEL
# --------------
# The ref to build is a free-form dispatch input (any commit/branch/tag/release),
# so its build scripts (build.rs, proc-macros) are UNTRUSTED code. Two jobs keep
# that code away from the AWS credentials:
#   * build   — checks out + compiles the untrusted ref. Has NO id-token, so a
#               malicious ref cannot mint/exfiltrate an OIDC token. Emits the
#               binaries as a workflow artifact.
#   * publish — downloads that artifact and uploads to S3. Has id-token:write but
#               checks out no untrusted code and runs only trusted steps.
#
# Publish is gated on the `baremetal-binaries` GitHub Environment: GitHub sets
# the OIDC `sub` to `repo:alpenlabs/strata-bridge:environment:baremetal-binaries`,
# which is what github-actions-strata-bridge-binary-s3 trusts (a dedicated,
# prefix-scoped role — NOT the whole-bucket circuit role). The environment's
# deployment-branch policy is pinned to `main` and carries required-reviewer
# protection.
#
# Objects land at:
#   s3://alpen-mosaic-artifacts/binaries/strata-bridge/<built-commit>/linux-amd64/
#     strata-bridge  secret-service  dev-cli  (+ a .sha256 sidecar each)
# A COMPLETED publish (`.publish-complete` marker, written last) is write-once;
# an interrupted upload is healed by re-running, never wedged.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to build & publish — commit SHA, branch, tag, or release (default: main)"
        required: false
        default: "main"
        type: string

# One publish per ref at a time; never cancel an in-flight publish mid-upload.
concurrency:
  group: publish-baremetal-binaries-${{ inputs.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_TO_ASSUME: arn:aws:iam::496607027995:role/github-actions-strata-bridge-binary-s3
  S3_BUCKET: alpen-mosaic-artifacts
  S3_PREFIX_ROOT: binaries/strata-bridge
  PLATFORM: linux-amd64

jobs:
  build:
    name: Build binaries (untrusted ref, no credentials)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read # deliberately no id-token here
    outputs:
      commit: ${{ steps.rev.outputs.sha }}
    steps:
      - name: Checkout the ref to build
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Resolve built commit (immutable SHA)
        id: rev
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          if [ -z "${sha}" ]; then
            echo "::error::failed to resolve commit SHA"; exit 1
          fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "Built commit: ${sha}"

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install FoundationDB client 7.3.43 (verified, required to link)
        # Inlined in the REVIEWED workflow (not ./.github/actions from the built
        # ref), so the pinned version + checksum can't be silently bypassed by an
        # old/modified ref. 7.3.43 matches docker/base.Dockerfile (prod build);
        # libfdb_c is dynamically linked so operators still run their own cluster.
        run: |
          set -euo pipefail
          deb="foundationdb-clients_7.3.43-1_amd64.deb"
          curl -fsSLO --proto "=https" --tlsv1.2 \
            "https://github.com/apple/foundationdb/releases/download/7.3.43/${deb}"
          echo "c3fa0a59c7355b914a1455dac909238d5ea3b6c6bc7b530af8597e6487c1651a  ${deb}" | sha256sum -c -
          sudo dpkg -i "${deb}"
          rm -f "${deb}"

      - name: Rust cache (restore-only)
        # This job compiles UNTRUSTED refs (see SECURITY MODEL), so it must never
        # write back to the shared Actions cache: rust-cache keys on lockfiles,
        # not the built commit, so a dispatched ref's build.rs/proc-macro output
        # could otherwise seed a cache that later trusted builds restore.
        # Restore-only keeps the speedup without the poisoning vector.
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          save-if: false

      - name: Pre-build SP1 core runner helper
        # The sp1 feature pulls in sp1-core-executor-runner, whose build.rs embeds
        # a nested-built helper that rust-cache does not preserve — on a cache hit
        # the include_bytes! fails. Pre-install the helper (version pinned by the
        # ref's Cargo.lock) and pass SP1_CORE_RUNNER_OVERRIDE_BINARY.
        id: sp1-runner
        run: |
          set -euo pipefail
          VER="$(awk -F'"' '/^name = "sp1-core-executor-runner-binary"$/{f=1;next} f&&/^version = /{print $2;exit}' Cargo.lock)"
          test -n "$VER" || { echo "::error::could not determine sp1-core-executor-runner-binary version from Cargo.lock"; exit 1; }
          cargo install sp1-core-executor-runner-binary --version "$VER" --locked --root "$RUNNER_TEMP/sp1-core-runner" --force
          echo "override-binary=$RUNNER_TEMP/sp1-core-runner/bin/sp1-core-executor-runner-binary" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        # strata-bridge needs --features sp1 (see header). SP1_SKIP_PROGRAM_BUILD
        # skips guest ELF compilation (ELFs delivered separately) so no succinct
        # toolchain is required. rustup auto-installs the pinned nightly from the
        # ref's rust-toolchain.toml.
        env:
          SP1_SKIP_PROGRAM_BUILD: "true"
          SP1_CORE_RUNNER_OVERRIDE_BINARY: ${{ steps.sp1-runner.outputs.override-binary }}
        run: |
          set -euo pipefail
          cargo build --release --locked -p strata-bridge --features sp1
          cargo build --release --locked -p secret-service -p dev-cli

      - name: Stage binaries + checksums
        run: |
          set -euo pipefail
          mkdir -p out
          for b in strata-bridge secret-service dev-cli; do
            install -m 0755 "target/release/${b}" "out/${b}"
            ( cd out && sha256sum "${b}" > "${b}.sha256" )
          done
          echo "Staged:"; ls -la out

      - name: Upload built binaries as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: strata-bridge-binaries-${{ steps.rev.outputs.sha }}
          path: out/
          if-no-files-found: error
          retention-days: 7 # must outlast the publish job's reviewer-approval wait

  publish:
    name: Publish to S3 (credentialed, no untrusted code)
    needs: build
    # Only the reviewed main copy of this workflow may publish. workflow_dispatch
    # can run a feature branch's YAML, so gate the OIDC-enabled job on the run ref
    # (belt-and-suspenders with the environment's main-only deployment policy).
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: baremetal-binaries
    # Serialize by resolved commit so two refs at the same commit can't double-publish.
    concurrency:
      group: publish-baremetal-s3-${{ needs.build.outputs.commit }}
      cancel-in-progress: false
    permissions:
      id-token: write # assume the S3 upload role via OIDC
      contents: read
    env:
      COMMIT: ${{ needs.build.outputs.commit }}
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: strata-bridge-binaries-${{ needs.build.outputs.commit }}
          path: out

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3 (write-once per completed publish)
        run: |
          set -euo pipefail
          DEST_KEY="${S3_PREFIX_ROOT}/${COMMIT}/${PLATFORM}"
          DEST="s3://${S3_BUCKET}/${DEST_KEY}"
          # Write-once is keyed on a completion marker written LAST, so an
          # interrupted upload never wedges the prefix: marker present = complete
          # publish, refuse; objects without marker = interrupted, heal by
          # re-uploading. List results are captured OUTSIDE an `if` so a list
          # error (missing ListBucket, transient) fails the job via set -e
          # instead of being treated as "not published".
          marker="$(aws s3api list-objects-v2 --bucket "${S3_BUCKET}" \
                     --prefix "${DEST_KEY}/.publish-complete" --max-items 1 \
                     --query 'Contents[0].Key' --output text)"
          if [ "${marker}" != "None" ] && [ -n "${marker}" ]; then
            echo "::error::${DEST_KEY}/ already published (completion marker present) — refusing to overwrite"
            exit 1
          fi
          partial="$(aws s3api list-objects-v2 --bucket "${S3_BUCKET}" \
                      --prefix "${DEST_KEY}/" --max-items 1 \
                      --query 'Contents[0].Key' --output text)"
          if [ "${partial}" != "None" ] && [ -n "${partial}" ]; then
            echo "::warning::${DEST_KEY}/ has objects but no completion marker (interrupted publish) — re-uploading"
          fi
          aws s3 cp out/ "${DEST}/" --recursive --no-progress
          printf 'commit=%s\ncompleted=%s\n' "${COMMIT}" "$(date -u +%FT%TZ)" \
            | aws s3 cp - "${DEST}/.publish-complete"
          echo "Published to ${DEST}/"

      - name: Job summary
        env:
          BUILT_REF: ${{ inputs.ref }}
        run: |
          {
            echo "### Bare-metal binaries published"
            echo ""
            echo "- ref built: \`${BUILT_REF}\` → commit \`${COMMIT}\`"
            echo "- location: \`s3://${S3_BUCKET}/${S3_PREFIX_ROOT}/${COMMIT}/${PLATFORM}/\`"
            echo "- binaries: \`strata-bridge\`, \`secret-service\`, \`dev-cli\` (+ \`.sha256\` each)"
          } >> "$GITHUB_STEP_SUMMARY"
