# Runs the SP1 proof functional tests with real Succinct network proving, on a
# schedule and on manual dispatch.
#
# The cron ticks hourly; the actual cadence is controlled by the repository
# variable SP1_FN_TESTS_INTERVAL_HOURS (default 6) via the schedule-gate job,
# because GitHub cannot read vars.* inside on.schedule.cron. Scheduled runs
# skip commits that already passed (cache marker keyed by SHA). Failures are
# reported to Slack through the SLACK_WEBHOOK_URL secret.
name: Functional tests (SP1 proofs)

on:
  schedule:
    - cron: "17 * * * *" # hourly tick; real cadence gated by vars.SP1_FN_TESTS_INTERVAL_HOURS
  workflow_dispatch:
    inputs:
      RUST_LOG:
        description: "Log level"
        required: false
        default: "info"
        type: string

env:
  CARGO_TERM_COLOR: always
  SP1_VERSION: v6.2.0

# Scheduled ticks queue behind an in-flight (up to 6 h) proving run instead of
# cancelling it; manual dispatch keeps the cancel-and-restart behavior.
concurrency:
  group: functional-sp1-proofs
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions: {}

jobs:
  schedule-gate:
    name: Decide whether this tick should run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .github

      - name: Check whether this commit already passed
        id: tested
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .sp1-fn-tested-marker
          key: sp1-fn-tested-${{ github.sha }}
          lookup-only: true

      - name: Decide
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          INTERVAL_HOURS: ${{ vars.SP1_FN_TESTS_INTERVAL_HOURS }}
          CACHE_HIT: ${{ steps.tested.outputs.cache-hit }}
        # Full logic in .github/scripts/schedule_gate.sh
        run: bash .github/scripts/schedule_gate.sh

  extract-rust-version:
    name: Extract toolchain version
    runs-on: ubuntu-latest
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    outputs:
      nightly-version: ${{ steps.extract-version.outputs.nightly-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Extract Rust version
        id: extract-version
        uses: ./.github/actions/extract-rust-version

  run:
    name: Run ${{ matrix.test }} with real SP1 proving
    runs-on: 16-core-runner
    needs: [extract-rust-version, schedule-gate]
    if: needs.schedule-gate.outputs.should_run == 'true'
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        test: [fn_bridge_proof, fn_counterproof]
        include:
          - test: fn_bridge_proof
            sp1-log-services: operator-0
          - test: fn_counterproof
            sp1-log-services: operator-1
    env:
      OPENSSL_VERSION: "3.5.0"
      OPENSSL_CACHE_VERSION: "v2"
      OPENSSL_INSTALL_DIR: ${{ github.workspace }}/.cache/openssl-3.5.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore cached OpenSSL build
        id: cache-openssl
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.OPENSSL_INSTALL_DIR }}
          key: ${{ runner.os }}-openssl-${{ env.OPENSSL_VERSION }}-${{ env.OPENSSL_CACHE_VERSION }}

      - name: Download and build OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          curl -fsSLO "https://www.openssl.org/source/openssl-$OPENSSL_VERSION.tar.gz"
          tar -xzf "openssl-$OPENSSL_VERSION.tar.gz"
          cd "openssl-$OPENSSL_VERSION"
          ./config --prefix="$OPENSSL_INSTALL_DIR" --openssldir="$OPENSSL_INSTALL_DIR"
          make -j"$(nproc)"
          make install_sw install_ssldirs

      - name: Configure OpenSSL environment
        run: |
          OPENSSL_LIB_DIR="$OPENSSL_INSTALL_DIR/lib64"
          if [ ! -d "$OPENSSL_LIB_DIR" ]; then
            OPENSSL_LIB_DIR="$OPENSSL_INSTALL_DIR/lib"
          fi
          {
            echo "OPENSSL_ROOT_DIR=$OPENSSL_INSTALL_DIR"
            echo "OPENSSL_DIR=$OPENSSL_INSTALL_DIR"
            echo "PKG_CONFIG_PATH=$OPENSSL_LIB_DIR/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
            echo "LD_LIBRARY_PATH=$OPENSSL_LIB_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          } >> "$GITHUB_ENV"
          echo "$OPENSSL_INSTALL_DIR/bin" >> "$GITHUB_PATH"

      - name: Cleanup space
        uses: ./.github/actions/cleanup # zizmor: ignore[unpinned-uses]

      - name: Install bitcoind
        env:
          BITCOIND_VERSION: "30.2"
          BITCOIND_ARCH: "x86_64-linux-gnu"
        run: |
          curl -fsSLO --proto "=https" --tlsv1.2 "https://bitcoincore.org/bin/bitcoin-core-$BITCOIND_VERSION/bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"
          curl -fsSLO --proto "=https" --tlsv1.2 "https://bitcoincore.org/bin/bitcoin-core-$BITCOIND_VERSION/SHA256SUMS"
          sha256sum --ignore-missing --check SHA256SUMS
          tar xzf "bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"
          sudo install -m 0755 -t /usr/local/bin "bitcoin-$BITCOIND_VERSION"/bin/*
          bitcoind --version
          rm -rf SHA256SUMS "bitcoin-$BITCOIND_VERSION" "bitcoin-$BITCOIND_VERSION-$BITCOIND_ARCH.tar.gz"

      - name: Install Rust toolchain
        env:
          RUST_NIGHTLY: ${{ needs.extract-rust-version.outputs.nightly-version }}
        run: |
          rustup toolchain install "$RUST_NIGHTLY" --profile minimal --component llvm-tools-preview
          rustup default "$RUST_NIGHTLY"

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          cache-on-failure: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          working-directory: functional-tests
          activate-environment: true
          enable-cache: true
          cache-suffix: "functional-tests"

      - name: Install libclang for bindgen
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Setup FoundationDB client
        uses: ./.github/actions/setup-foundationdb

      - name: Setup FoundationDB server
        uses: ./.github/actions/setup-foundationdb-server

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0

      - name: Install SP1 toolchain
        run: |
          curl -fsSL --proto '=https' --tlsv1.2 https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up --version "$SP1_VERSION"
          echo "$HOME/.sp1/bin" >> "$GITHUB_PATH"

      - name: Verify SP1 toolchain
        run: cargo prove --version

      # Ports + creds match functional-tests/sp1-env.bash.sample so run_test.sh /
      # gen_asm_params_external.py pick them up without overrides.
      - name: Start regtest bitcoind
        run: |
          mkdir -p "$RUNNER_TEMP/btcdata"
          bitcoind -regtest -daemon -server=1 -txindex=1 -acceptnonstdtxn=0 \
            -fallbackfee=0.00001 -datadir="$RUNNER_TEMP/btcdata" \
            -rpcbind=127.0.0.1 -rpcallowip=127.0.0.1/32 \
            -rpcuser=user -rpcpassword=password -rpcport=18443 \
            -zmqpubhashblock=tcp://127.0.0.1:28332 \
            -zmqpubhashtx=tcp://127.0.0.1:28333 \
            -zmqpubrawblock=tcp://127.0.0.1:28334 \
            -zmqpubrawtx=tcp://127.0.0.1:28335 \
            -zmqpubsequence=tcp://127.0.0.1:28336
          for _ in $(seq 60); do
            if bitcoin-cli -regtest -rpcuser=user -rpcpassword=password getblockcount 2>/dev/null; then
              echo "bitcoind ready"
              exit 0
            fi
            sleep 1
          done
          echo "bitcoind did not become ready within 60s" >&2
          exit 1

      # Activate the SP1 opt-in branch in run_test.sh by materializing sp1-env.bash
      # from the sample, then delegate. `-t <path>` bypasses entry.py's
      # SKIP_GROUPS_BY_DEFAULT filter on `proofs/`.
      - name: Run ${{ matrix.test }}
        id: funcTestsRun
        continue-on-error: true
        env:
          RUST_LOG: ${{ inputs.RUST_LOG || 'info' }} # inputs is empty on schedule events
          NO_COLOR: "1"
          LOG_LEVEL: "info"
          PYTHON_VERSION: "3.12"
          NETWORK_PRIVATE_KEY: ${{ secrets.NETWORK_PRIVATE_KEY }}
          TEST_FILE: ${{ matrix.test }}
        run: |
          cp functional-tests/sp1-env.bash.sample functional-tests/sp1-env.bash
          ./functional-tests/run_test.sh -t "functional-tests/tests/proofs/${TEST_FILE}.py"

      # Surface the raw sp1_sdk::network::prover request block (cycle limit,
      # gas limit, explorer URL, ...) on the run's summary page, pass or fail.
      - name: Render SP1 proof request summary
        env:
          TEST_FILE: ${{ matrix.test }}
          SP1_LOG_SERVICES: ${{ matrix.sp1-log-services }}
        run: python3 .github/scripts/render_sp1_proof_summary.py

      - name: Zip log files on failure
        if: steps.funcTestsRun.outcome == 'failure'
        # Create a zip archive (logs.zip) that includes only service.log files,
        # preserving the folder structure starting from functional-tests/_dd
        run: |
          find functional-tests/_dd -type f -name "service.log" | zip -@ logs.zip
          zip -r logs.zip functional-tests/_dd -i '*/logs/*.log'

      - name: Upload logs as build artifact on failure
        if: steps.funcTestsRun.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fntest_dd-${{ matrix.test }}
          path: logs.zip
          retention-days: 30
          if-no-files-found: error
          compression-level: 0 # already compressed

      - name: Stop bitcoind
        if: always()
        run: bitcoin-cli -regtest -rpcuser=user -rpcpassword=password stop || true

      - name: Fail job if test failed
        if: steps.funcTestsRun.outcome == 'failure'
        run: |
          echo "Functional test ${{ matrix.test }} failed"
          exit 1

  # Marks this SHA as tested so later scheduled ticks skip it. Manual runs
  # count too: a manually verified commit is not re-proven on schedule.
  mark-tested:
    name: Record commit as tested
    runs-on: ubuntu-latest
    needs: [run] # default needs semantics: runs only when every matrix leg passed
    timeout-minutes: 5
    steps:
      - name: Save tested marker
        run: echo "tested" > .sp1-fn-tested-marker

      - name: Cache tested marker
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .sp1-fn-tested-marker
          key: sp1-fn-tested-${{ github.sha }}

  notify-failure:
    name: Notify Slack on failure
    runs-on: ubuntu-latest
    needs: [schedule-gate, run, mark-tested]
    if: failure()
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .github

      # Expressions cannot slice strings, so the short SHA is composed in bash.
      - name: Compose failure message
        id: msg
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # shellcheck disable=SC2016 # backticks are literal Slack mrkdwn
          {
            echo "text<<MSG_EOF"
            printf '🚨 *%s failed* — commit `%s` (%s run)\n<%s|View run>\n' \
              "$WORKFLOW_NAME" "${COMMIT_SHA:0:7}" "$EVENT_NAME" "$RUN_URL"
            echo "MSG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Slack alert
        uses: ./.github/actions/notify-slack # zizmor: ignore[unpinned-uses]
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          message: ${{ steps.msg.outputs.text }}

  functional-sp1-proofs-success:
    name: Check that all SP1 proof tests pass
    runs-on: ubuntu-latest
    if: always()
    # extract-rust-version must be listed: its failure skips `run`, and a skip
    # is only acceptable when the gate (not a broken dependency) caused it.
    # Both it and `run` only ever skip on gate-declined ticks, where the gate
    # itself still reports success.
    needs: [schedule-gate, extract-rust-version, run]
    timeout-minutes: 5
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: extract-rust-version, run # a gate-skipped tick is green, not a failure
