name: Trivy image scan and summarize
description: >
  Runs a Trivy image scan: hard gate (CRITICAL/HIGH, blocks push) then advisory SARIF
  (all severities, Security tab) and CycloneDX SBOM (supply-chain artifact).
  Gate failures propagate to the caller, preventing any push step from running.

inputs:
  image_ref:
    description: "Image reference to scan (local tag or registry URL)."
    required: true
  display_name:
    description: "Human-readable component name for step and summary labels."
    required: true
  component:
    description: "Component identifier used for output file names."
    required: true
  repository:
    description: "ECR repository path — used for display in the summary report."
    required: true
  image_tag:
    description: "Image tag — used for display in the summary report."
    required: true
  ecr_registry:
    description: "ECR registry URL — used for display in the summary report."
    required: true
  ecr_repository_prefix:
    description: "ECR repository prefix — used for display in the summary report."
    required: true
  trivy_scanners:
    description: "Comma-separated Trivy scanners (e.g. vuln,secret,misconfig)."
    required: true
  trivy_timeout:
    description: "Trivy scan timeout (e.g. 15m)."
    required: true
  sarif_category:
    description: "Category label for the GitHub SARIF upload (e.g. bridge-ecr-strata-bridge)."
    required: true
  artifact_name:
    description: "Name of the GitHub Actions artifact to upload scan results under."
    required: true
  trivyignores:
    description: "Path to .trivyignore.yaml file for CVE suppressions. Pass empty string to use no ignore file."
    required: false
    default: ""
  skip_dirs:
    description: "Comma-separated directories to exclude from the scan (e.g. /root/.cargo,/root/.rustup for builder images)."
    required: false
    default: ""

outputs:
  status:
    description: "Scan status: 'success' or 'failed'."
    value: ${{ steps.trivy_scan.outputs.status }}
  json_rc:
    description: "Exit code of the gate JSON-format scan."
    value: ${{ steps.trivy_scan.outputs.json_rc }}
  sarif_rc:
    description: "Exit code of the SARIF-format scan."
    value: ${{ steps.trivy_scan.outputs.sarif_rc }}
  json_exists:
    description: "Whether the JSON output file was produced ('true'/'false')."
    value: ${{ steps.trivy_outputs.outputs.json_exists }}
  sarif_exists:
    description: "Whether the SARIF output file was produced ('true'/'false')."
    value: ${{ steps.trivy_outputs.outputs.sarif_exists }}

runs:
  using: "composite"
  steps:
    - name: Prepare Trivy output directory
      shell: bash
      run: mkdir -p trivy-results

    # Install Trivy once and reuse the same binary for all scan formats.
    - name: Install Trivy once for ${{ inputs.display_name }}
      uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
      with:
        version: v0.69.3
        cache: true

    # Hard gate — build fails and no image is pushed if CRITICAL or HIGH unfixed
    # vulnerabilities are found. Add justified exceptions to .trivyignore.yaml via PR.
    - name: Scan ${{ inputs.display_name }} with Trivy (hard gate)
      id: trivy_gate
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      with:
        scan-type: image
        scan-ref: ${{ inputs.image_ref }}
        format: json
        output: trivy-results/${{ inputs.component }}.json
        timeout: ${{ inputs.trivy_timeout }}
        scanners: ${{ inputs.trivy_scanners }}
        docker-host: unix:///var/run/docker.sock
        severity: CRITICAL,HIGH
        ignore-unfixed: "true"
        exit-code: "1"
        hide-progress: "true"
        skip-setup-trivy: "true"
        trivyignores: ${{ inputs.trivyignores }}
        skip-dirs: ${{ inputs.skip_dirs }}

    # Advisory SARIF scan — runs even if the hard gate failed so that findings
    # are always visible in the Security tab for triage.
    - name: Scan ${{ inputs.display_name }} with Trivy (SARIF — Security tab)
      id: trivy_sarif
      if: always()
      continue-on-error: true
      # trivy is pinned to v0.69.3 by the setup-trivy step above; this invocation passes
      # `skip-setup-trivy: "true"` to reuse that binary, so trivy itself is not unpinned here.
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 # zizmor: ignore[unpinned-tools]
      with:
        scan-type: image
        scan-ref: ${{ inputs.image_ref }}
        format: sarif
        output: trivy-results/${{ inputs.component }}.sarif
        timeout: ${{ inputs.trivy_timeout }}
        scanners: ${{ inputs.trivy_scanners }}
        docker-host: unix:///var/run/docker.sock
        severity: CRITICAL,HIGH,MEDIUM,LOW
        ignore-unfixed: "true"
        exit-code: "0"
        hide-progress: "true"
        skip-setup-trivy: "true"
        trivyignores: ${{ inputs.trivyignores }}
        skip-dirs: ${{ inputs.skip_dirs }}

    # Advisory SBOM — CycloneDX artifact for supply chain tracking.
    - name: Generate SBOM for ${{ inputs.display_name }} (CycloneDX)
      id: trivy_sbom
      if: always()
      continue-on-error: true
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      with:
        scan-type: image
        scan-ref: ${{ inputs.image_ref }}
        format: cyclonedx
        output: trivy-results/${{ inputs.component }}.sbom.json
        timeout: ${{ inputs.trivy_timeout }}
        scanners: ${{ inputs.trivy_scanners }}
        docker-host: unix:///var/run/docker.sock
        exit-code: "0"
        hide-progress: "true"
        skip-setup-trivy: "true"
        trivyignores: ${{ inputs.trivyignores }}
        skip-dirs: ${{ inputs.skip_dirs }}

    - name: Record Trivy scan status for ${{ inputs.display_name }}
      id: trivy_scan
      if: always()
      shell: bash
      env:
        COMPONENT: ${{ inputs.component }}
        DISPLAY_NAME: ${{ inputs.display_name }}
        GATE_OUTCOME: ${{ steps.trivy_gate.outcome }}
        SARIF_OUTCOME: ${{ steps.trivy_sarif.outcome }}
      run: |
        if [[ "${GATE_OUTCOME}" == "success" ]]; then
          json_rc=0
        else
          json_rc=1
        fi

        if [[ "${SARIF_OUTCOME}" == "success" ]]; then
          sarif_rc=0
        else
          sarif_rc=1
        fi

        if [[ "${json_rc}" -eq 0 ]]; then
          status="success"
        else
          status="failed"
          echo "::error::Trivy hard gate for ${DISPLAY_NAME} found CRITICAL/HIGH unfixed CVEs"
        fi

        {
          echo "json_rc=${json_rc}"
          echo "sarif_rc=${sarif_rc}"
          echo "status=${status}"
        } >> "${GITHUB_OUTPUT}"

    - name: Detect Trivy outputs for ${{ inputs.display_name }}
      if: always()
      id: trivy_outputs
      shell: bash
      env:
        COMPONENT: ${{ inputs.component }}
      run: |
        [[ -f "trivy-results/${COMPONENT}.json" ]] && echo "json_exists=true" >> "${GITHUB_OUTPUT}" || echo "json_exists=false" >> "${GITHUB_OUTPUT}"
        [[ -f "trivy-results/${COMPONENT}.sarif" ]] && echo "sarif_exists=true" >> "${GITHUB_OUTPUT}" || echo "sarif_exists=false" >> "${GITHUB_OUTPUT}"

    - name: Summarize Trivy results for ${{ inputs.display_name }}
      if: always()
      shell: bash
      env:
        COMPONENT_DISPLAY_NAME: ${{ inputs.display_name }}
        COMPONENT_NAME: ${{ inputs.component }}
        IMAGE_REPOSITORY: ${{ inputs.repository }}
        IMAGE_TAG: ${{ inputs.image_tag }}
        ECR_REGISTRY: ${{ inputs.ecr_registry }}
        ECR_REPOSITORY_PREFIX: ${{ inputs.ecr_repository_prefix }}
        TRIVY_STATUS: ${{ steps.trivy_scan.outputs.status }}
        TRIVY_JSON_RC: ${{ steps.trivy_scan.outputs.json_rc }}
        TRIVY_SARIF_RC: ${{ steps.trivy_scan.outputs.sarif_rc }}
        TRIVY_JSON_EXISTS: ${{ steps.trivy_outputs.outputs.json_exists }}
        TRIVY_SCANNERS: ${{ inputs.trivy_scanners }}
        TRIVY_TIMEOUT: ${{ inputs.trivy_timeout }}
      # Full logic in .github/scripts/render_trivy_summary.py
      run: |
        python3 .github/scripts/render_trivy_summary.py
        echo "::group::Trivy summary for ${COMPONENT_DISPLAY_NAME}"
        cat "trivy-results/${COMPONENT_NAME}.md"
        echo "::endgroup::"

    # Uploads SARIF to the repository's Security → Code scanning tab.
    - name: Upload Trivy SARIF for ${{ inputs.display_name }}
      if: always() && steps.trivy_outputs.outputs.sarif_exists == 'true'
      uses: github/codeql-action/upload-sarif@5d4e8d1aca955e8d8589aabd499c5cae939e33c7 # v3
      with:
        sarif_file: trivy-results/${{ inputs.component }}.sarif
        category: ${{ inputs.sarif_category }}

    # Bundles JSON, SARIF, SBOM, and Markdown as a downloadable artifact.
    - name: Upload scan artifact for ${{ inputs.display_name }}
      if: always() && (steps.trivy_outputs.outputs.json_exists == 'true' || steps.trivy_outputs.outputs.sarif_exists == 'true')
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      with:
        name: ${{ inputs.artifact_name }}
        if-no-files-found: warn
        path: |
          trivy-results/${{ inputs.component }}.json
          trivy-results/${{ inputs.component }}.sarif
          trivy-results/${{ inputs.component }}.sbom.json
          trivy-results/${{ inputs.component }}.md
