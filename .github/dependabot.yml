version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/" 
    schedule:
      interval: "monthly"
      day: "2"  # Run on the 2nd of every month
      time: "00:00"
      timezone: "UTC"
    # Group all updates into a single PR
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Keep security updates separate for urgent handling
    open-pull-requests-limit: 10
    commit-message:
      # Use conventional commit format as specified in user rules
      prefix: "chore(deps)"
      include: "scope" 