[package]
name = "strata-bridge"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
btc-tracker.workspace = true
strata-bridge-asm-events.workspace = true
strata-bridge-common.workspace = true
strata-bridge-db2.workspace = true
strata-bridge-p2p-service.workspace = true

strata-l1-txfmt.workspace = true
strata-tasks.workspace = true

anyhow.workspace = true
bitcoin.workspace = true
bitcoin-bosd.workspace = true
clap.workspace = true
hex.workspace = true
libp2p.workspace = true
secp256k1.workspace = true
serde.workspace = true
tokio.workspace = true
toml.workspace = true
tracing.workspace = true

[target.'cfg(not(target_env = "msvc"))'.dependencies]
memory_pprof = { workspace = true, optional = true }
tikv-jemallocator = "0.6"

[features]
default = []
# not compatible with windows/msvc
memory_profiling = [
  "tikv-jemallocator/profiling",
  "tikv-jemallocator/unprefixed_malloc_on_supported_platforms",
  "dep:memory_pprof",
]
