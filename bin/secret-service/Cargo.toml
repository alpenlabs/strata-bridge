[package]
name = "secret-service"
version = "0.2.0"
edition = "2021"

[lints]
workspace = true

[dependencies]
secret-service-proto.workspace = true
secret-service-server.workspace = true
strata-bridge-key-deriv.workspace = true
strata-bridge-primitives.workspace = true

bitcoin.workspace = true
cache-advisor = "1.0.16"
colored = "3.1.1"
hkdf.workspace = true
libp2p-identity = { workspace = true, features = ["ed25519"] }
musig2.workspace = true
rand.workspace = true
rcgen = "0.13.2"
rustls-pemfile = "2.2.0"
serde.workspace = true
sha2.workspace = true
terrors.workspace = true
tokio.workspace = true
toml = "0.8.19"
tracing.workspace = true
tracing-subscriber.workspace = true

[target.'cfg(not(target_env = "msvc"))'.dependencies]
memory_pprof = { path = "../../crates/memory_pprof", optional = true }
tikv-jemallocator = "0.6"

[dev-dependencies]
rcgen = "0.13.2"
secret-service-client.workspace = true

[features]
default = []
# not compatible with windows/msvc
memory_profiling = [
  "tikv-jemallocator/profiling",
  "tikv-jemallocator/unprefixed_malloc_on_supported_platforms",
  "dep:memory_pprof",
]
