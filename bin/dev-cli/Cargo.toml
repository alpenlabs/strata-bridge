[package]
name = "dev-cli"
version = "0.2.0"
edition = "2021"

[lints]
workspace = true

[[bin]]
name = "dev-cli"
path = "src/main.rs"

[dependencies]
jsonrpsee = { workspace = true, features = ["http-client"] }
strata-bridge-common.workspace = true
strata-bridge-key-deriv.workspace = true
strata-bridge-primitives.workspace = true
strata-bridge-rpc = { workspace = true, features = ["client"] }
strata-bridge-tx-graph.workspace = true

ssz.workspace = true
strata-asm-proto-bridge-v1-txs.workspace = true
strata-asm-proto-checkpoint-txs.workspace = true
strata-asm-proto-checkpoint-types.workspace = true
strata-codec.workspace = true
strata-crypto.workspace = true
strata-identifiers.workspace = true
strata-l1-envelope-fmt.workspace = true
strata-l1-txfmt.workspace = true
strata-ol-bridge-types.workspace = true
strata-test-utils-arb.workspace = true

alloy.workspace = true
anyhow.workspace = true
bitcoin.workspace = true
bitcoin-bosd = { workspace = true, features = ["address"] }
bitcoincore-rpc.workspace = true
clap.workspace = true
hex.workspace = true
k256.workspace = true
libp2p-identity = { workspace = true, features = ["ed25519"] }
miniscript.workspace = true
musig2.workspace = true
rand.workspace = true
secp256k1 = { workspace = true, features = ["global-context", "rand"] }
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
