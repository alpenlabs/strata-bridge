[package]
name = "strata-bridge-sp1-guest-builder"
version = "0.1.0"
edition = "2021"

[features]
default = []
build-elf = ["dep:sp1-build", "dep:ssz", "dep:strata-bridge-proof"]
docker-build = ["build-elf"]

[build-dependencies]
sp1-build = { version = "6.2.0", optional = true }
ssz = { workspace = true, optional = true }
strata-bridge-proof = { workspace = true, optional = true, features = ["sp1"] }
