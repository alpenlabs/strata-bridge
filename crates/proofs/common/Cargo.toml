[package]
name = "strata-bridge-proof-common"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]

[target.'cfg(not(target_os = "zkvm"))'.dependencies]
anyhow.workspace = true
borsh = { workspace = true, optional = true }
hex.workspace = true
k256.workspace = true
serde.workspace = true
sp1-sdk = { workspace = true, optional = true }
sp1-verifier = { workspace = true, optional = true }
strata-predicate = { workspace = true, optional = true }
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
zkaleido.workspace = true
zkaleido-native-adapter.workspace = true
zkaleido-sp1-groth16-verifier = { workspace = true, optional = true, features = [
  "borsh",
] }
zkaleido-sp1-host = { workspace = true, optional = true }

[features]
default = []
sp1 = [
  "dep:borsh",
  "dep:sp1-sdk",
  "dep:sp1-verifier",
  "dep:strata-predicate",
  "dep:zkaleido-sp1-groth16-verifier",
  "dep:zkaleido-sp1-host",
]
