[package]
name = "strata-bridge-proof"
version = "0.1.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
cfg-if.workspace = true
moho-recursive-proof.workspace = true
moho-types.workspace = true
ssz.workspace = true
ssz_derive.workspace = true
strata-asm-proto-bridge-v1.workspace = true
strata-asm-proto-bridge-v1-txs.workspace = true
strata-codec.workspace = true
strata-merkle = { workspace = true, features = ["ssz"] }
strata-predicate.workspace = true
zkaleido = { workspace = true, features = ["ssz"] }
zkaleido-native-adapter.workspace = true
zkaleido-sp1-host = { workspace = true, optional = true }

# Used only by the host-only `genesis` module; excluded from zkvm guest builds so they don't
# need to resolve or trip `unused_crate_dependencies`.
[target.'cfg(not(target_os = "zkvm"))'.dependencies]
moho-runtime-interface.workspace = true
serde_json.workspace = true
strata-asm-params.workspace = true
strata-asm-proof-impl.workspace = true
strata-asm-spec.workspace = true

[features]
default = []
sp1 = ["dep:zkaleido-sp1-host"]
